<!doctype html>
<html lang="sr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0605" />
  <meta name="description" content="Detalji kategorije — Cigar Shop Belgrade" />
  <title>Cigar Shop — Kategorija</title>

  <link rel="icon" href="/assets/brand/logo-128.png" type="image/png" />
  <link rel="apple-touch-icon" href="/assets/brand/logo-256.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,500&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/animations.css" />
  <link rel="stylesheet" href="/css/responsive.css" />
</head>
<body class="blog-page-body category-page-body">

  <header class="header">
    <div class="header__inner">
      <a class="brand" href="/" aria-label="Cigar Shop home">
        <span class="brand__logo" role="img" aria-label="Cigar Shop monogram"></span>
        <span class="brand__name">Cigar Shop</span>
      </a>
      <a class="btn btn--ghost" href="/" data-i18n="blog.back">← Nazad na sajt</a>
    </div>
  </header>

  <main class="blog-page category-page" id="category-root">
    <!-- JS render (category-page.js) -->
  </main>

  <!-- Lightbox (deli iste klase kao index, init iz category-page.js) -->
  <div class="lightbox" id="lightbox" aria-hidden="true" role="dialog" aria-label="Gallery lightbox">
    <button class="lightbox-close" aria-label="Zatvori">×</button>
    <button class="lightbox-nav lightbox-prev" aria-label="Prethodna">‹</button>
    <button class="lightbox-nav lightbox-next" aria-label="Sledeća">›</button>
    <div class="lightbox-stage"></div>
    <div class="lightbox-bottom">
      <div class="lightbox-caption"></div>
      <div class="lightbox-counter"><span id="lb-current">1</span><span class="lb-sep">/</span><span id="lb-total">1</span></div>
    </div>
  </div>

  <footer class="footer">
    <div class="footer__inner">
      <p class="footer__tag" data-i18n="footer.tag">Umetnost strpljenja, 5 lokacija.</p>
      <p class="footer__age" data-i18n="footer.age">18+. Duvan šteti zdravlju.</p>
    </div>
  </footer>

  <script type="module" src="/js/category-page.js"></script>
</body>
</html>
