<!doctype html>
<html lang="sr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0605" />
  <meta name="description" content="Priče iz dima. Deset istorijskih činjenica o cigarama — Kolumbo, Čerčil, Castro, torcedori, Vuelta Abajo." />
  <title>Cigar Shop — Priče iz dima</title>

  <link rel="icon" href="/assets/brand/logo-128.png" type="image/png" />
  <link rel="apple-touch-icon" href="/assets/brand/logo-256.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,500&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/animations.css" />
  <link rel="stylesheet" href="/css/responsive.css" />
</head>
<body class="blog-page-body">

  <header class="header">
    <div class="header__inner">
      <a class="brand" href="/" aria-label="Cigar Shop home">
        <img class="brand__logo" src="/assets/brand/logo-monogram-gold-256.png" alt="Cigar Shop" width="40" height="40" />
        <span class="brand__name">Cigar Shop</span>
      </a>
      <a class="btn btn--ghost" href="/" data-i18n="blog.back">← Nazad na sajt</a>
    </div>
  </header>

  <main class="blog-page">
    <section class="blog-page__hero">
      <p class="kicker" data-i18n="blog.kicker">Blog</p>
      <h1 class="heading-display" data-i18n="blog.title">Priče iz dima.</h1>
      <p class="lead" data-i18n="blog.lead">Deset istorijskih činjenica o cigarama. Kolumbo, Čerčil, Castro, torcedori, Vuelta Abajo.</p>
    </section>

    <div class="blog-page__list" id="blog-posts">
      <!-- JS render -->
    </div>
  </main>

  <footer class="footer">
    <div class="footer__inner">
      <p class="footer__tag" data-i18n="footer.tag">Umetnost strpljenja, 5 lokacija.</p>
      <p class="footer__age" data-i18n="footer.age">18+. Duvan šteti zdravlju.</p>
    </div>
  </footer>

  <script type="module" src="/js/blog-page.js"></script>
</body>
</html>
